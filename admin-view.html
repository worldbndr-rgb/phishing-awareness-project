<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض بيانات المحاكاة - للمشرف</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 0;
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .admin-header {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .admin-header h1 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .admin-header h1 i {
            color: #667eea;
        }
        
        .warning-message {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border-right: 5px solid #ffc107;
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-card-small {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        
        .export-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .export-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .export-excel {
            background: #28a745;
            color: white;
        }
        
        .export-csv {
            background: #667eea;
            color: white;
        }
        
        .export-pdf {
            background: #dc3545;
            color: white;
        }
        
        .export-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .clear-all {
            background: #6c757d;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-right: auto;
        }
        
        .table-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            font-weight: 600;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .email-cell {
            color: #667eea;
            font-weight: 600;
        }
        
        .password-cell {
            font-family: monospace;
            color: #28a745;
        }
        
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .delete-btn:hover {
            background: #c82333;
        }
        
        .footer-links {
            text-align: center;
            margin-top: 30px;
        }
        
        .footer-links a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
        }
        
        .no-data {
            text-align: center;
            padding: 50px;
            color: #999;
        }
        
        .no-data i {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .stats-cards {
                grid-template-columns: 1fr;
            }
            
            .export-buttons {
                flex-direction: column;
            }
            
            table {
                font-size: 0.9rem;
            }
            
            td, th {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- الهيدر -->
        <div class="admin-header">
            <h1><i class="fas fa-chart-bar"></i> لوحة تحكم المشرف - بيانات المحاكاة</h1>
            <p>عرض بيانات المستخدمين من تجارب المحاكاة التعليمية</p>
            
            <div class="warning-message">
                <i class="fas fa-exclamation-triangle"></i>
                <strong>تنبيه:</strong> هذه البيانات من تجارب تعليمية والمستخدمون تم تنبيههم بعدم إدخال بيانات حقيقية
            </div>
            
            <!-- إحصائيات سريعة -->
            <div class="stats-cards" id="stats-cards">
                <!-- تتعبأ بالجافاسكريبت -->
            </div>
            
            <!-- أزرار التصدير -->
            <div class="export-buttons">
                <button class="export-btn export-excel" onclick="exportToExcel()">
                    <i class="fas fa-file-excel"></i> تصدير Excel
                </button>
                <button class="export-btn export-csv" onclick="exportToCSV()">
                    <i class="fas fa-file-csv"></i> تصدير CSV
                </button>
                <button class="export-btn export-pdf" onclick="exportToPDF()">
                    <i class="fas fa-file-pdf"></i> تصدير PDF
                </button>
                <button class="clear-all" onclick="clearAllData()">
                    <i class="fas fa-trash"></i> مسح الكل
                </button>
            </div>
        </div>
        
        <!-- جدول البيانات -->
        <div class="table-container">
            <div id="data-table-container">
                <!-- يتم تعبئة الجدول عبر الجافاسكريبت -->
            </div>
        </div>
        
        <!-- روابط العودة -->
        <div class="footer-links">
            <a href="../index.html"><i class="fas fa-arrow-right"></i> العودة للصفحة الرئيسية</a>
        </div>
    </div>
    
    <script>
        // تحميل البيانات
        let simulationData = [];
        
        function loadData() {
            const saved = localStorage.getItem('phishingSimulationData');
            if (saved) {
                simulationData = JSON.parse(saved);
            }
            updateDisplay();
            updateStats();
        }
        
        // تحديث العرض
        function updateDisplay() {
            const container = document.getElementById('data-table-container');
            
            if (simulationData.length === 0) {
                container.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-database"></i>
                        <h3>لا توجد بيانات بعد</h3>
                        <p>قم بتجربة المحاكاة في الصفحة الرئيسية أولاً</p>
                    </div>
                `;
                return;
            }
            
            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>البريد الإلكتروني</th>
                            <th>كلمة المرور</th>
                            <th>التاريخ والوقت</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            simulationData.forEach((item, index) => {
                tableHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td class="email-cell">${item.email}</td>
                        <td class="password-cell">${'•'.repeat(item.password.length)}</td>
                        <td>${item.timestamp || new Date(item.date).toLocaleString('ar-SA')}</td>
                        <td>
                            <button class="delete-btn" onclick="deleteEntry(${item.id})">
                                <i class="fas fa-trash"></i> حذف
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            tableHTML += `
                    </tbody>
                </table>
            `;
            
            container.innerHTML = tableHTML;
        }
        
        // تحديث الإحصائيات
        function updateStats() {
            const statsContainer = document.getElementById('stats-cards');
            
            const total = simulationData.length;
            const uniqueEmails = new Set(simulationData.map(item => item.email)).size;
            const avgPasswordLength = simulationData.length > 0 
                ? Math.round(simulationData.reduce((sum, item) => sum + item.password.length, 0) / simulationData.length)
                : 0;
            
            statsContainer.innerHTML = `
                <div class="stat-card-small">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">إجمالي المحاولات</div>
                </div>
                <div class="stat-card-small">
                    <div class="stat-number">${uniqueEmails}</div>
                    <div class="stat-label">بريد إلكتروني فريد</div>
                </div>
                <div class="stat-card-small">
                    <div class="stat-number">${avgPasswordLength}</div>
                    <div class="stat-label">متوسط طول كلمة المرور</div>
                </div>
            `;
        }
        
        // حذف مدخل
        function deleteEntry(id) {
            if (confirm('هل أنت متأكد من حذف هذا المدخل؟')) {
                simulationData = simulationData.filter(item => item.id !== id);
                localStorage.setItem('phishingSimulationData', JSON.stringify(simulationData));
                updateDisplay();
                updateStats();
            }
        }
        
        // مسح الكل
        function clearAllData() {
            if (confirm('هل أنت متأكد من حذف جميع البيانات؟')) {
                simulationData = [];
                localStorage.removeItem('phishingSimulationData');
                updateDisplay();
                updateStats();
            }
        }
        
        // تصدير إلى CSV
        function exportToCSV() {
            if (simulationData.length === 0) {
                alert('لا توجد بيانات للتصدير');
                return;
            }
            
            let csv = 'البريد الإلكتروني,كلمة المرور,التاريخ\n';
            simulationData.forEach(item => {
                csv += `"${item.email}","${item.password}",${item.date}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `phishing-data-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }
        
        // تصدير إلى Excel
        function exportToExcel() {
            if (simulationData.length === 0) {
                alert('لا توجد بيانات للتصدير');
                return;
            }
            
            let html = `
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>بيانات المحاكاة</title>
                </head>
                <body>
                    <h1>بيانات تجارب التوعية بالتصيد</h1>
                    <table border="1">
                        <tr>
                            <th>البريد الإلكتروني</th>
                            <th>كلمة المرور</th>
                            <th>التاريخ</th>
                        </tr>
            `;
            
            simulationData.forEach(item => {
                html += `
                    <tr>
                        <td>${item.email}</td>
                        <td>${item.password}</td>
                        <td>${new Date(item.date).toLocaleString('ar-SA')}</td>
                    </tr>
                `;
            });
            
            html += `
                    </table>
                </body>
                </html>
            `;
            
            const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `phishing-data-${new Date().toISOString().split('T')[0]}.xls`;
            a.click();
        }
        
        // تصدير إلى PDF (طباعة)
        function exportToPDF() {
            window.print();
        }
        
        // تحميل البيانات عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
